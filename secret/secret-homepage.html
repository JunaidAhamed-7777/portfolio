<!DOCTYPE html>
<html data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Homepage</title>
    <link rel="stylesheet" href="../styles/themes.css">
    <link rel="stylesheet" href="../styles/main.css">
    <link rel="stylesheet" href="secret.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="secret-header">
        <button id="home-button" class="theme-toggle">
            <span class="icon-dark"><img src="../assets/home-dark.png" alt="Home" class="theme-icon"></span>
            <span class="icon-light"><img src="../assets/home-light.png" alt="Home" class="theme-icon"></span>
        </button>
        <button id="theme-toggle" class="theme-toggle">
            <span class="icon-dark"><img src="../assets/sun.png" alt="Light mode" class="theme-icon"></span>
            <span class="icon-light"><img src="../assets/moon.png" alt="Dark mode" class="theme-icon"></span>
        </button>
    </div>
    
    <div class="secret-content">
        <h2>Enter your secret code</h2>
        <input type="text" id="secret-code-input" placeholder="Type Here">
        <button id="submit-secret-code">Submit</button>
        <div id="code-message"></div>
    </div>
    
    <script src="../scripts/animations.js"></script>
    <script src="../scripts/main.js"></script>
    <script src="secret.js"></script>
</body>
</html>
